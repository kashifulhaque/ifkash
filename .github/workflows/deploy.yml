name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Install worker-build
        # Pin to ^0.7 to match worker = "0.7.2" in api/Cargo.toml.
        # Newer worker-build (>= 0.8) requires worker >= 0.8.1.
        run: cargo install -q worker-build --version ^0.7

      - name: Build worker
        working-directory: ./api
        run: worker-build --release

      # Apply any pending D1 migrations BEFORE deploying the new code, so the
      # schema is never behind the Worker that queries it. This is idempotent:
      # wrangler tracks applied migrations in the d1_migrations table and skips
      # ones already run, so re-runs with nothing pending are a no-op.
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./api
          wranglerVersion: "4.50.0"
          command: d1 migrations apply ifkash --remote

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: ./api
          wranglerVersion: "4.50.0"
