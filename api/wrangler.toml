# ./api/wrangler.toml

name = "ifkash-api"                 # avoid colliding with your Pages project name
main = "build/worker/shim.mjs"      # preferred output of worker-build (see note below)
compatibility_date = "2025-10-01"
# Disabled so the Worker is ONLY reachable via ifkash.dev/api/* (behind
# Cloudflare Access for protected paths). A *.workers.dev URL would bypass Access.
workers_dev = false
observability = { enabled = true }

[build]
# Pin worker-build to ^0.7 because Cargo.toml uses worker = "0.7.2".
# Newer worker-build (>= 0.8) requires worker >= 0.8.1 and would break the build.
command = "cargo install -q worker-build --version ^0.7 && worker-build --release"
watch_dir = "src"

# Route only /api/* on your domain to this Worker.
# Ensure your domain is a Cloudflare zone in your account.
[[routes]]
pattern = "ifkash.dev/api/*"
zone_name = "ifkash.dev"

[[kv_namespaces]]
binding = "IFKASH_HN"
id = "85ed35403df24a01942b9ed8d3bbf3f4"

[[d1_databases]]
binding = "IFKASH_D1"
database_name = "ifkash"
database_id = "b84c4a60-0130-4784-a638-17e529ae5ab3"
migrations_dir = "migrations"

# Rendered resume PDFs (binary) — D1 holds the source + metadata + R2 key.
[[r2_buckets]]
binding = "RESUME_BUCKET"
bucket_name = "ifkash"

[vars]
# Only this email (verified by Cloudflare Access) may write resume versions.
OWNER_EMAIL = "haque.kashiful7@gmail.com"
# Google OAuth client ID for the /game leaderboard (audience check on ID tokens).
# Must match PUBLIC_GOOGLE_CLIENT_ID in the web app's environment.
GOOGLE_CLIENT_ID = "589199944334-at0seduhfggnrnmncrnnke6asstd13fc.apps.googleusercontent.com"

# Secrets (set via `wrangler secret put <NAME>`):
#   WEATHER_UNION_API_KEY - /api/home_weather
# The old POCKETBASE_EMAIL/PASSWORD secrets are no longer used and can be
# removed with `wrangler secret delete POCKETBASE_EMAIL` (and ...PASSWORD).
